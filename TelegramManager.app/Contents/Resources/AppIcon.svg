<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#965cf9"/>
      <stop offset="100%" stop-color="#4f2795"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background (violet gradient) -->
  <rect x="40" y="40" width="432" height="432" rx="100" ry="100" fill="url(#bg)"/>
  <!-- 2x2 account-card grid -->
  <rect x="150" y="110" width="96" height="62" rx="16" fill="#c8b3f0"/>
  <rect x="266" y="110" width="96" height="62" rx="16" fill="#f9f7fe"/>
  <rect x="150" y="190" width="96" height="62" rx="16" fill="#c8b3f0"/>
  <rect x="266" y="190" width="96" height="62" rx="16" fill="#c8b3f0"/>
  <!-- TM monogram -->
  <text x="256" y="400" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="150" font-weight="800" fill="white" text-anchor="middle">TM</text>
</svg>
